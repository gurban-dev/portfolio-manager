name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: greenportfolio_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/base.txt
        pip install pytest pytest-django pytest-cov
    
    - name: Run migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://user:pass@localhost:5432/greenportfolio_test
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: 'False'
        POSTGRES_DB: greenportfolio_test
        POSTGRES_USER: user
        POSTGRES_PASSWORD: pass
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
      run: |
        python manage.py makemigrations --check
        python manage.py migrate
    
    - name: Run tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://user:pass@localhost:5432/greenportfolio_test
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: 'False'
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        POSTGRES_DB: greenportfolio_test
        POSTGRES_USER: user
        POSTGRES_PASSWORD: pass
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  frontend-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./frontend/package.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run linter
      working-directory: ./frontend
      run: npm run lint

    - name: Run typecheck
      working-directory: ./frontend
      run: npm run typecheck
    
    - name: Build
      working-directory: ./frontend
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/notifications/

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: portfolio-manager-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: false
        tags: portfolio-manager-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
